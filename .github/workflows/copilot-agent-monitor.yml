# Copilot Agent Activity Monitor
#
# Watches Copilot coding agent PR lifecycle and:
# 1. Comments on the PR itself with status updates
# 2. Syncs Azure DevOps work item state (To Do → Doing → Done)
# 3. Comments CI results on the PR
#
# Copilot agent PRs are identified by:
# - Branch name starting with copilot/
# - PR author login "Copilot"
#
# ADO ticket linking uses AB#NNN in PR title or body.
# Copilot agent includes this automatically when triggered from ADO.

name: Copilot Agent Monitor

on:
  pull_request:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: ["Copilot Setup Steps"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ─── PR lifecycle events ───────────────────────────────────────────
  pr-lifecycle:
    if: >-
      github.event_name == 'pull_request' &&
      (startsWith(github.event.pull_request.head.ref, 'copilot/') ||
       github.event.pull_request.user.login == 'Copilot')
    runs-on: ubuntu-latest
    steps:
      - name: Extract linked ADO ID and determine event
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          # Extract ADO ticket ID from AB#NNN pattern in title or body
          ADO_ID=""
          if [[ "$PR_TITLE" =~ AB#([0-9]+) ]]; then
            ADO_ID="${BASH_REMATCH[1]}"
          elif [[ "$PR_BODY" =~ AB#([0-9]+) ]]; then
            ADO_ID="${BASH_REMATCH[1]}"
          fi

          # Determine the event type
          EVENT=""
          if [[ "$PR_ACTION" == "opened" ]]; then
            EVENT="started"
          elif [[ "$PR_ACTION" == "reopened" ]]; then
            EVENT="restarted"
          elif [[ "$PR_ACTION" == "closed" && "$PR_MERGED" == "true" ]]; then
            EVENT="merged"
          elif [[ "$PR_ACTION" == "closed" && "$PR_MERGED" != "true" ]]; then
            EVENT="closed"
          fi

          echo "ado_id=$ADO_ID" >> "$GITHUB_OUTPUT"
          echo "event=$EVENT" >> "$GITHUB_OUTPUT"

          echo "Detected: event=$EVENT ado=$ADO_ID branch=$PR_BRANCH"

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          EVENT: ${{ steps.extract.outputs.event }}
          ADO_ID: ${{ steps.extract.outputs.ado_id }}
          AZURE_DEVOPS_ORG: ${{ secrets.AZURE_DEVOPS_ORG }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
        with:
          script: |
            const event = process.env.EVENT;
            const adoId = process.env.ADO_ID;
            const org = process.env.AZURE_DEVOPS_ORG;
            const project = process.env.AZURE_DEVOPS_PROJECT;

            const adoLink = adoId
              ? `[AB#${adoId}](https://dev.azure.com/${org}/${project}/_workitems/edit/${adoId})`
              : null;

            const adoNote = adoLink ? ` · Linked to ${adoLink}` : '';

            const messages = {
              started: `🤖 **Copilot agent monitor** — PR opened${adoNote}\n\nADO state → **Doing**`,
              restarted: `🔄 **Copilot agent monitor** — PR reopened${adoNote}\n\nADO state → **Doing**`,
              merged: `✅ **Copilot agent monitor** — PR merged${adoNote}\n\nADO state → **Done**`,
              closed: `❌ **Copilot agent monitor** — PR closed without merge${adoNote}\n\nADO state → **To Do**`,
            };

            const body = messages[event];
            if (body) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              console.log(`Commented on PR: ${event}`);
            }

      - name: Update ADO work item state
        if: steps.extract.outputs.ado_id != ''
        env:
          ADO_ID: ${{ steps.extract.outputs.ado_id }}
          EVENT: ${{ steps.extract.outputs.event }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG: ${{ secrets.AZURE_DEVOPS_ORG }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
        run: |
          # Map event to ADO state
          case "$EVENT" in
            started|restarted) ADO_STATE="Doing" ;;
            merged)            ADO_STATE="Done" ;;
            closed)            ADO_STATE="To Do" ;;
            *)                 echo "Unknown event: $EVENT"; exit 0 ;;
          esac

          B64=$(printf ":%s" "$AZURE_DEVOPS_PAT" | base64 -w 0)

          echo "Updating ADO work item #$ADO_ID → $ADO_STATE"

          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X PATCH \
            -H "Content-Type: application/json-patch+json" \
            -H "Authorization: Basic $B64" \
            "https://dev.azure.com/${AZURE_DEVOPS_ORG}/${AZURE_DEVOPS_PROJECT}/_apis/wit/workitems/${ADO_ID}?api-version=7.1" \
            -d "[{\"op\": \"replace\", \"path\": \"/fields/System.State\", \"value\": \"${ADO_STATE}\"}]") || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "✅ ADO #$ADO_ID → $ADO_STATE"
          else
            echo "❌ Failed to update ADO #$ADO_ID (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -5
          fi

  # ─── CI status on Copilot agent PRs ────────────────────────────────
  ci-status:
    if: >-
      github.event_name == 'workflow_run' &&
      startsWith(github.event.workflow_run.head_branch, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Find PR and comment CI result
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const conclusion = context.payload.workflow_run.conclusion;
            const runUrl = context.payload.workflow_run.html_url;
            const runName = context.payload.workflow_run.name;

            // Find the open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log(`No open PR found for branch ${branch}`);
              return;
            }

            const pr = prs[0];
            let body;
            if (conclusion === 'success') {
              body = `🟢 **CI passed** — [${runName}](${runUrl}) completed successfully.`;
            } else if (conclusion === 'failure') {
              body = `🔴 **CI failed** — [${runName}](${runUrl}) failed. The agent may push a fix automatically.\n\n[View failure details](${runUrl})`;
            } else {
              body = `⚪ **CI ${conclusion}** — [${runName}](${runUrl})`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
            console.log(`CI ${conclusion} comment on PR #${pr.number}`);
