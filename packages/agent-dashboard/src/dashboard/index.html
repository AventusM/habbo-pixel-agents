<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .status {
      margin-left: auto;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
    }
    .header .dot.connected { background: #3fb950; }
    .header .dot.connecting { background: #d29922; }
    .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .agents { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
    .agent-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .agent-card:hover { border-color: #58a6ff; }
    .agent-card .name { font-size: 14px; font-weight: 600; color: #58a6ff; }
    .agent-card .pr-title { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .agent-card .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
    }
    .agent-card .badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.active { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
    .badge.idle { background: rgba(139, 148, 158, 0.2); color: #8b949e; }
    .badge.error { background: rgba(248, 81, 73, 0.2); color: #f85149; }
    .activity {
      font-size: 11px;
      color: #8b949e;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }
    .activity .tool { color: #d2a8ff; }
    .feed-mode {
      font-size: 10px;
      color: #484f58;
      margin-top: 6px;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #484f58;
    }
    .empty h2 { font-size: 18px; margin-bottom: 8px; color: #8b949e; }
    .empty p { font-size: 13px; }
    .ticket-link {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 6px;
      background: rgba(210, 168, 255, 0.1);
      border-radius: 4px;
      font-size: 10px;
      color: #d2a8ff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Agent Dashboard</h1>
    <div class="status">
      <div class="dot" id="ws-dot"></div>
      <span id="ws-label">Disconnected</span>
    </div>
  </div>
  <div class="container">
    <div class="agents" id="agents"></div>
    <div class="empty" id="empty">
      <h2>Waiting for agents...</h2>
      <p>Connecting to WebSocket server for real-time agent events.</p>
    </div>
  </div>

  <script>
    const agents = new Map();
    const agentsEl = document.getElementById('agents');
    const emptyEl = document.getElementById('empty');
    const wsDot = document.getElementById('ws-dot');
    const wsLabel = document.getElementById('ws-label');

    function setWsState(state) {
      wsDot.className = 'dot ' + state;
      wsLabel.textContent = state === 'connected' ? 'Connected' :
                            state === 'connecting' ? 'Connecting...' : 'Disconnected';
    }

    function renderAgents() {
      if (agents.size === 0) {
        agentsEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      agentsEl.innerHTML = '';
      for (const [id, agent] of agents) {
        const card = document.createElement('div');
        card.className = 'agent-card';

        const statusClass = agent.status === 'active' ? 'active' :
                           agent.status === 'error' ? 'error' : 'idle';

        let activityHtml = '';
        if (agent.lastActivity) {
          activityHtml = `<div class="activity"><span class="tool">${agent.lastToolName || ''}</span> ${agent.lastActivity}</div>`;
        }

        let ticketHtml = '';
        if (agent.ticketId) {
          ticketHtml = `<span class="ticket-link">AB#${agent.ticketId}</span>`;
        }

        let feedHtml = '';
        if (agent.feedMode) {
          const icon = agent.feedMode === 'sse' ? '🟢' :
                       agent.feedMode === 'fast-poll' ? '🟠' : '🟡';
          feedHtml = `<div class="feed-mode">${icon} ${agent.feedMode}</div>`;
        }

        card.innerHTML = `
          <div class="name">${agent.name || id}</div>
          <div class="pr-title">${agent.taskArea || ''}</div>
          ${ticketHtml}
          <div class="status-row">
            <span class="badge ${statusClass}">${agent.status || 'unknown'}</span>
            <span>${agent.role || ''}</span>
          </div>
          ${activityHtml}
          ${feedHtml}
        `;
        agentsEl.appendChild(card);
      }
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'agentCreated': {
          agents.set(msg.agentId, {
            name: msg.terminalName || msg.agentId,
            role: msg.role || '',
            team: msg.team || '',
            taskArea: msg.taskArea || '',
            status: 'idle',
            variant: msg.variant || 0,
          });
          renderAgents();
          break;
        }
        case 'agentStatus': {
          const a = agents.get(msg.agentId);
          if (a) { a.status = msg.status; renderAgents(); }
          break;
        }
        case 'agentTool': {
          const a = agents.get(msg.agentId);
          if (a) {
            a.lastToolName = msg.toolName;
            a.lastActivity = msg.displayText || msg.toolName;
            renderAgents();
          }
          break;
        }
        case 'agentLinkedTicket': {
          const a = agents.get(msg.agentId);
          if (a) { a.ticketId = msg.ticketId; a.ticketTitle = msg.ticketTitle; renderAgents(); }
          break;
        }
        case 'agentFeedMode': {
          const a = agents.get(msg.agentId);
          if (a) { a.feedMode = msg.feedMode; a.feedReason = msg.feedReason; renderAgents(); }
          break;
        }
        case 'agentRemoved': {
          agents.delete(msg.agentId);
          renderAgents();
          break;
        }
      }
    }

    // WebSocket connection
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      setWsState('connecting');
      try {
        ws = new WebSocket('ws://' + window.location.host);
      } catch (e) {
        setWsState('disconnected');
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        setWsState('connected');
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg && msg.type) handleMessage(msg);
        } catch (e) { /* ignore parse errors */ }
      };

      ws.onclose = () => {
        setWsState('disconnected');
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = () => { /* onclose fires after */ };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, 3000);
    }

    connect();
  </script>
</body>
</html>
