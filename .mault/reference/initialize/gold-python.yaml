# =============================================================================
# Mault Gold Template — Python
# =============================================================================
# Proven configuration for ALL detectors on Python projects.
# The AI agent should customize paths, entry points, and deprecated patterns
# to match the actual project structure.
#
# ONLY keys the extension reads are included here.
# DO NOT add: conventions.directories, conventions.naming, environment
# Those keys are decorative — the extension ignores them.
#
# UC Coverage:
#   UC01 - Directory Reinforcement      (Detectors.directoryReinforcement)
#   UC02 - Legacy Path Prevention       (deprecatedPatterns)
#   UC03 - Naming Convention            (Detectors.namingConvention)
#   UC04 - Environment Reinforcement    (Detectors.environmentReinforcement)
#   UC06 - Temporary Files              (Detectors.tempFiles)
#   UC07 - Flat Architecture            (Detectors.flatArchitecture)
#   UC08 - Configuration Chaos          (Detectors.configChaos)
#   UC09 - File Proliferation           (Detectors.fileProliferation)
#   UC11 - Overcrowded Folders          (Detectors.overcrowdedFolders)
#   UC12 - Scattered Utils              (Detectors.misplacedUtilities)
#   UC13 - Application Flow Analysis    (applicationFlows, flows)
#   UC14 - Monolith Detection           (monolithDetection)
#   UC16 - Dependency Health (Pro)      (Detectors.dependencyHealth)
#   UC17 - Architecture Diagrams (Pro)  (Detectors.productionReadiness)
#   UC18 - Structural Governance (Pro)  (rules)
# =============================================================================

version: 1

# =============================================================================
# UC02: LEGACY PATH PREVENTION
# =============================================================================
# Detect deprecated imports and function calls.
# Customize: add project-specific deprecated patterns.

deprecatedPatterns:
  # ----- Python 2/3 Migration -----
  - id: dep-optparse
    import: optparse
    message: "optparse is deprecated since Python 2.7. Use 'argparse' instead."
    languages: [python]

  - id: dep-urllib2
    import: urllib2
    message: "urllib2 is Python 2 only. Use 'urllib.request' instead."
    languages: [python]

  - id: dep-httplib
    import: httplib
    message: "httplib is Python 2 only. Use 'http.client' instead."
    languages: [python]

  - id: dep-imp
    import: imp
    message: "imp module is deprecated since Python 3.4. Use 'importlib' instead."
    languages: [python]

  - id: dep-cgi
    import: cgi
    message: "cgi module is deprecated since Python 3.11. Use modern web frameworks."
    languages: [python]

  - id: dep-crypt
    import: crypt
    message: "crypt module is deprecated since Python 3.11. Use 'passlib' instead."
    languages: [python]

  - id: dep-pipes
    import: pipes
    message: "pipes module is deprecated since Python 3.11. Use 'subprocess' instead."
    languages: [python]

  - id: dep-getopt
    import: getopt
    message: "getopt is legacy. Use 'argparse' or 'click' instead."
    languages: [python]

  - id: dep-distutils
    import: distutils
    message: "distutils is deprecated since Python 3.10. Use 'setuptools' instead."
    languages: [python]

  - id: dep-pkg-resources
    import: pkg_resources
    message: "pkg_resources is deprecated. Use 'importlib.metadata' instead."
    languages: [python]

  # ----- Deprecated Functions -----
  - id: dep-os-popen
    functionCall: os.popen
    message: "os.popen is deprecated. Use 'subprocess.run()' instead."
    languages: [python]

  - id: dep-os-system
    functionCall: os.system
    message: "os.system is deprecated. Use 'subprocess.run()' instead."
    languages: [python]

  # ----- Security Deprecations -----
  - id: dep-md5
    functionCall: hashlib.md5
    message: "MD5 is cryptographically broken. Use 'hashlib.sha256' for security."
    languages: [python]

  - id: dep-sha1
    functionCall: hashlib.sha1
    message: "SHA1 is deprecated for security. Use 'hashlib.sha256' instead."
    languages: [python]

  - id: dep-random-security
    functionCall: random.random
    message: "random module is not cryptographically secure. Use 'secrets' for security."
    languages: [python]

  # ----- Library Deprecations -----
  - id: dep-nose
    import: nose
    message: "nose is deprecated. Migrate to 'pytest' instead."
    languages: [python]

  - id: dep-mock
    import: mock
    message: "mock library is deprecated. Use 'unittest.mock' instead."
    languages: [python]

# =============================================================================
# UC13: APPLICATION FLOW ANALYSIS
# =============================================================================
# Customize: map the project's actual entry points and critical paths.

applicationFlows:
  - id: authentication
    name: "Authentication Flow"
    description: "User login, logout, session, and token management"

  - id: data-access
    name: "Data Access Layer"
    description: "Database connections, ORM, and repository operations"

  - id: api-core
    name: "API Core"
    description: "Main API endpoints, routing, and request handling"

  - id: business-logic
    name: "Business Logic"
    description: "Core business rules and domain services"

flows:
  authentication:
    name: "Authentication Flow"
    description: "User authentication, authorization, and session management"
    critical: true
    files:
      - "**/auth*.py"
      - "**/login*.py"
      - "**/session*.py"
      - "**/token*.py"
      - "**/middleware/auth*.py"

  data-access:
    name: "Data Access Layer"
    description: "Database and ORM operations"
    critical: true
    files:
      - "**/db*.py"
      - "**/database*.py"
      - "**/repository*.py"
      - "**/models/**/*.py"

  api-core:
    name: "API Core"
    description: "Main API routing and handlers"
    critical: true
    files:
      - "**/api*.py"
      - "**/routes*.py"
      - "**/views*.py"
      - "**/endpoints*.py"

  business-logic:
    name: "Business Logic"
    description: "Core business rules and domain services"
    critical: true
    files:
      - "**/services/**/*.py"
      - "**/domain/**/*.py"

applicationFlowBlindness:
  enabled: true
  thresholds:
    warnOnDirectDependents: 5
    warnOnTransitiveDependents: 15
  excludePatterns:
    - "**/venv/**"
    - "**/.venv/**"
    - "**/env/**"
    - "**/__pycache__/**"
    - "**/test_*.py"
    - "**/*_test.py"
    - "**/tests/**"
    - "**/.tox/**"
    - "**/.pytest_cache/**"

# =============================================================================
# DETECTORS CONFIGURATION (UC01-UC17)
# =============================================================================

Detectors:
  # UC01: Directory Reinforcement
  # Customize: match the project's actual file naming patterns and directories.
  directoryReinforcement:
    enabled: true
    rules:
      # Service files (snake_case convention)
      - pattern: "**/*_service.py"
        expectedDir: "src/services"
        reason: "Service files should be in src/services/"
      - pattern: "**/*_service.py"
        expectedDir: "app/services"
        reason: "Service files should be in app/services/"

      # Repository/DAO files
      - pattern: "**/*_repository.py"
        expectedDir: "src/repositories"
        reason: "Repository files should be in src/repositories/"
      - pattern: "**/*_dao.py"
        expectedDir: "src/repositories"
        reason: "DAO files should be in src/repositories/"

      # Utility files
      - pattern: "**/*_util*.py"
        expectedDir: "src/utils"
        reason: "Utility files should be in src/utils/"
      - pattern: "**/*_helper*.py"
        expectedDir: "src/utils"
        reason: "Helper files should be in src/utils/"
      - pattern: "**/utils_*.py"
        expectedDir: "src/utils"
        reason: "Utility files should be in src/utils/"
      - pattern: "**/helpers_*.py"
        expectedDir: "src/utils"
        reason: "Helper files should be in src/utils/"

      # Model files
      - pattern: "**/*_model.py"
        expectedDir: "src/models"
        reason: "Model files should be in src/models/"

      # Test files
      - pattern: "**/test_*.py"
        expectedDir: "tests"
        reason: "Test files should be in tests/"
      - pattern: "**/*_test.py"
        expectedDir: "tests"
        reason: "Test files should be in tests/"

      # Configuration files
      - pattern: "**/config*.py"
        expectedDir: "src/config"
        reason: "Configuration files should be in src/config/"
      - pattern: "**/settings*.py"
        expectedDir: "src/config"
        reason: "Settings files should be in src/config/"

  # UC03: Naming Convention
  namingConvention:
    enabled: true
    fileNaming: "snake_case"
    excludePatterns:
      - "**/conftest.py"
      - "**/__init__.py"
      - "**/*.config.*"
      - "**/Makefile"
      - "**/Dockerfile"
      - "**/Pipfile"
    variableNaming: "snake_case"
    functionNaming: "snake_case"
    classNaming: "PascalCase"
    constantNaming: "SCREAMING_SNAKE_CASE"

  # UC04: Environment Reinforcement
  environmentReinforcement:
    enabled: true
    checkPaths: true
    checkCommands: true

  # UC06: Temporary Files
  tempFiles:
    enabled: true
    patterns:
      - "**/*.tmp"
      - "**/temp_*"
      - "**/temp-*"
      - "**/temp.*"
      - "**/scratch_*"
      - "**/scratch-*"
      - "**/scratch.*"
      - "**/scratchpad.*"
      - "**/*.bak"
      - "**/*_backup.*"
      - "**/*-backup.*"
      - "**/*_old.*"
      - "**/*-old.*"
      - "**/*.backup"
      - "**/debug_*"
      - "**/debug-*"
      - "**/debug.*"
      - "**/.ipynb_checkpoints/**"
      - "**/*.pyc"
      - "**/*.pyo"

  # UC07: Flat Architecture
  # Customize: path and expectedLayerNames for the project's source structure.
  flatArchitecture:
    enabled: true
    targets:
      - path: "src"
        maxRootFiles: 10
        minSubdirs: 3
        excludePatterns: ["__pycache__/**", "*.egg-info/**"]
      - path: "app"
        maxRootFiles: 10
        minSubdirs: 3
        excludePatterns: ["__pycache__/**"]
      - path: "."
        maxRootFiles: 15
        excludePatterns: ["venv/**", ".venv/**", "__pycache__/**", ".git/**", "dist/**"]

  # UC08: Configuration Chaos
  # Customize: requiredConfigs for the project's actual config files.
  configChaos:
    enabled: true
    requiredConfigs:
      - ".gitignore"
      - "requirements.txt"
    optionalConfigs:
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - ".env.example"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pytest.ini"
      - "tox.ini"
      - ".flake8"
      - "mypy.ini"

  # UC09: File Proliferation
  fileProliferation:
    enabled: true
    threshold: 3

  # UC11: Overcrowded Folders
  # Customize: paths and maxFiles for the project's actual directories.
  overcrowdedFolders:
    enabled: true
    targets:
      - path: "src"
        maxFiles: 20
      - path: "app"
        maxFiles: 20
      - path: "src/utils"
        maxFiles: 15
      - path: "src/services"
        maxFiles: 20
      - path: "src/models"
        maxFiles: 25

  # UC12: Misplaced Utilities
  misplacedUtilities:
    enabled: true
    centralLocation: "src/utils"

  # UC16: Dependency Health (Pro)
  dependencyHealth:
    enabled: true
    severityThreshold: "moderate"

  # UC17: Architecture Diagrams (Pro)
  productionReadiness:
    enabled: true

  # Project Scaffolding
  projectScaffolding:
    enabled: true
    rootMaxFiles: 15

  # Dead End Directories
  deadEnds:
    enabled: true
    ignoreGlobs: ["**/venv/**", "**/.venv/**", "**/__pycache__/**", "**/.git/**"]
    maxFiles: 500
    timeBudgetMs: 5000

# =============================================================================
# UC14: Monolith Detection
# =============================================================================
monolithDetection:
  enabled: true
  thresholds:
    sourceWarnLoc: 750
    sourceFailLoc: 1500
    testWarnLoc: 1500
    testFailLoc: 3000
    maxFunctionLoc: 100
  excludePatterns: []

# =============================================================================
# UC18: STRUCTURAL GOVERNANCE (Pro)
# =============================================================================
# rules must be at top-level (not nested under Detectors).
# Assertion types: export_exists, function_signature, import_exists,
#                  ast_skeleton, forbidden_pattern, semantic_similarity

rules:
  # Service classes must have Service suffix
  - id: SVC-001
    name: "Service Class Naming"
    severity: error
    files: "**/services/**/*.py"
    description: "Service files must export a class ending with Service"
    assertions:
      - type: export_exists
        pattern: "*Service"
        message: "Service file must export a class with Service suffix"

  # Services should import from models
  - id: SVC-002
    name: "Service Model Import"
    severity: warning
    files: "**/services/**/*.py"
    description: "Services should import from models for data types"
    assertions:
      - type: import_exists
        source: ".models"
        message: "Services should import from models package"

  # No print() in production code (src/)
  - id: LOG-001
    name: "No Print Statements"
    severity: warning
    files: "src/**/*.py"
    description: "Use logging module instead of print()"
    assertions:
      - type: forbidden_pattern
        pattern: "print\\s*\\("
        message: "Use logging module instead of print()"

  # No print() in production code (app/)
  - id: LOG-002
    name: "No Print Statements (App)"
    severity: warning
    files: "app/**/*.py"
    description: "Use logging module instead of print()"
    assertions:
      - type: forbidden_pattern
        pattern: "print\\s*\\("
        message: "Use logging module instead of print()"

  # No debug breakpoints
  - id: DEBUG-001
    name: "No Breakpoints"
    severity: error
    files: "**/*.py"
    description: "Remove breakpoint() and pdb before committing"
    assertions:
      - type: forbidden_pattern
        pattern: "breakpoint\\s*\\(|import\\s+pdb|pdb\\.set_trace"
        message: "Remove debug breakpoints before committing"

  # No focused tests
  - id: TEST-001
    name: "No Focused Tests"
    severity: error
    files: "tests/**/*.py"
    description: "Prevent committing focused tests"
    assertions:
      - type: forbidden_pattern
        pattern: "@pytest\\.mark\\.only|@only|@pytest\\.mark\\.skip\\(reason=.TODO"
        message: "Remove focused test markers before committing"

  # No TODO/FIXME in production
  - id: TODO-001
    name: "No TODO in Production"
    severity: info
    files: "src/**/*.py"
    description: "Address TODO comments before production"
    assertions:
      - type: forbidden_pattern
        pattern: "#\\s*TODO:|#\\s*FIXME:|#\\s*HACK:"
        message: "Address TODO/FIXME/HACK comments"

  # No bare except
  - id: ERR-001
    name: "No Bare Except"
    severity: warning
    files: "**/*.py"
    description: "Avoid bare except clauses"
    assertions:
      - type: forbidden_pattern
        pattern: "except\\s*:"
        message: "Use specific exception types instead of bare except"

  # No wildcard imports
  - id: IMPORT-001
    name: "No Wildcard Imports"
    severity: warning
    files: "**/*.py"
    description: "Avoid wildcard imports"
    assertions:
      - type: forbidden_pattern
        pattern: "from\\s+\\w+\\s+import\\s+\\*"
        message: "Use explicit imports instead of wildcard imports"
